<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>bike</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <style>
      .swiper {
        width: 100%;
        height: 100%;
      }

      .swiper-slide {
        text-align: center;
        font-size: 18px;
        background: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .swiper-slide img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body class="h-screen flex">
    <div class="swiper mySwiper">
      <div class="swiper-wrapper">
        <div class="swiper-slide">
          <img
            src="images\bike1\bike1ko2.jpg"
            alt="bike"
          />
        </div>
        <div class="swiper-slide">
          <img
            src="images\bike1\bike1ko3.jpg"
            alt="bike"
          />
        </div>
        <div class="swiper-slide">
          <img
            src="images\bike1\bike1ko4.jpg"
            alt="bike"
          />
        </div>
        <div class="swiper-slide">
          <img
            src="images\bike1\bike1ko5.jpg"
            alt="bike"
          />
        </div>
        <div class="swiper-slide">
          <img
            src="images\bike1\bike1ko6.jpg"
            alt="bike"
          />
        </div>
      </div>
      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
      <div class="swiper-pagination"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="bikescript.js"></script>
  </body>
</html>
